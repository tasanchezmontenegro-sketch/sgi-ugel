services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - "5432:5432"

  web:
    build: .
    command: >
      bash -c "python manage.py collectstatic --noinput &&
               python manage.py migrate &&
               daphne -b 0.0.0.0 -p 8000 gestion_incidencias.asgi:application"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
    environment:
      - GIO_USE_VFS=local

volumes:
  postgres_data:
  static_volume:
