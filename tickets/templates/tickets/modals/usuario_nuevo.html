{% load static %}
<link rel="stylesheet" href="{% static 'css/modales_usuarios.css' %}">

<div class="modal fade" id="modalNuevoUsuario" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">

            <div class="modal-header-app">
                <h5 class="modal-title">
                    <div class="modal-title-icon">
                        <i class="bi bi-person-plus-fill"></i>
                    </div>
                    Nuevo Usuario
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <form action="{% url 'crear_usuario' %}" method="POST">
                {% csrf_token %}
                <div class="modal-body-app">
                    <div class="row g-3">

                        <div class="col-12">
                            <div class="modal-section-divider">
                                <span>Credenciales</span>
                            </div>
                        </div>

                        <div class="col-12">
                            <label class="form-label">DNI / Nombre de usuario</label>
                            <div class="modal-input-wrap">
                                <input type="text" name="username" placeholder="Ej: 72784717" required maxlength="8">
                            </div>
                            <div class="dni-hint mt-2">
                                <i class="bi bi-info-circle-fill"></i>
                                <span>El DNI será el nombre de usuario. La clave inicial será <strong>Ugel@</strong> +
                                    los últimos 4 dígitos del DNI.</span>
                            </div>
                        </div>

                        <div class="col-12">
                            <div class="modal-section-divider">
                                <span>Datos personales</span>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Nombres</label>
                            <div class="modal-input-wrap">
                                <input type="text" name="first_name" placeholder="Ej: Pedro" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Apellidos</label>
                            <div class="modal-input-wrap">
                                <input type="text" name="last_name" placeholder="Ej: Agramonte Córdova" required>
                            </div>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Correo electrónico</label>
                            <div class="modal-input-wrap">
                                <input type="email" name="email" placeholder="correo@ugel.gob.pe">
                            </div>
                        </div>

                        <div class="col-12">
                            <div class="modal-section-divider">
                                <span>Acceso y área</span>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Rol</label>
                            <div class="modal-input-wrap">
                                <select name="role">
                                    <option value="usuario">Trabajador</option>
                                    <option value="tecnico">Técnico</option>
                                    <option value="administrador">Administrador</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Área</label>
                            <div class="modal-input-wrap">
                                <select name="area">
                                    {% for area in areas %}
                                    <option value="{{ area.id }}">{{ area.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>

                    </div>
                </div>

                <div class="modal-footer-app">
                    <button type="button" class="btn-modal-cancel" data-bs-dismiss="modal">
                        <i class="bi bi-x"></i> Cancelar
                    </button>
                    <button type="submit" class="btn-modal-confirm">
                        <i class="bi bi-person-check-fill"></i> Crear Usuario
                    </button>
                </div>
            </form>

        </div>
    </div>
</div>
